<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 07 - Ejercicio 2</title>
    <script>
        function mostrarAlerta() {
            alert("¡Hola, mundo!");
        }
        function cambiarColorFondo() {
            document.body.style.backgroundColor = "lightblue";
        }
        function cambiarTexto() {
            document.body.innerHTML = "<h1>¡Texto cambiado!</h1>";
        }

    </script>

</head>

<body>

    <h1>Ejercicio 02 </h1>
    <button onclick="mostrarAlerta()">Mostrar Alerta</button>
    <button onclick="cambiarColorFondo()">Mostrar Alerta COLOR</button>
    <button onclick="cambiarTexto()">Mostrar Alerta texto</button>
    <script>
        function cambiarbackground() {
            document.body.style.backgroundColor = "lightgreen";
        }
    </script>
    <button onclick="cambiarbackground()">Cambiar background body</button>
</body>

</html>
